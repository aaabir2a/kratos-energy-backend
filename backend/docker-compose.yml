services:
  postgres:
    image: postgres:16-alpine
    container_name: kratos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kratos
      POSTGRES_PASSWORD: kratos
      POSTGRES_DB: kratos_crm
    ports:
      - "5432:5432"
    volumes:
      - kratos_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kratos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - kratos_redis:/data

  minio:
    image: minio/minio:latest
    container_name: kratos_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kratos
      MINIO_ROOT_PASSWORD: kratos12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - kratos_minio:/data

volumes:
  kratos_pg:
  kratos_redis:
  kratos_minio:
