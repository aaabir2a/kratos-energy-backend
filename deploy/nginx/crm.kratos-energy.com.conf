# Host nginx (NOT the container) — reverse proxy for the CRM web container.
# The web container already serves the SPA and proxies /api internally, so the
# host just forwards everything to it. Only affects crm.kratos-energy.com.
# certbot --nginx will add the 443 server + redirect automatically.
server {
    listen 80;
    listen [::]:80;
    server_name crm.kratos-energy.com;

    client_max_body_size 30M;   # image uploads through the CRM

    location / {
        proxy_pass http://127.0.0.1:8080;   # WEB_PORT from docker compose .env
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
