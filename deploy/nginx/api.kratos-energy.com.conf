# Host nginx (NOT the container) — reverse proxy for the backend API.
# Drop into /etc/nginx/sites-available/ and symlink into sites-enabled/.
# Only affects the api.kratos-energy.com vhost — other projects untouched.
# certbot --nginx will add the 443 server + redirect automatically.
server {
    listen 80;
    listen [::]:80;
    server_name api.kratos-energy.com;

    client_max_body_size 30M;   # image uploads

    location / {
        proxy_pass http://127.0.0.1:4000;   # API_PORT from docker compose .env
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
