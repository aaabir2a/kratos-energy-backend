# CRM container nginx: serve the SPA and proxy /api to the backend service.
# The frontend calls a relative /api/v1 base, so this keeps it same-origin
# (no CORS) when reached via crm.kratos-energy.com.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # hero + catalog image uploads
    client_max_body_size 30M;

    # gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API → backend container (compose service name "api")
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # hashed build assets — cache hard
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
